<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 		 
    <link rel="stylesheet" href="../profile.css"> -->
    <link rel="stylesheet" href="../../staticfiles/gap_utils.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

    <header>

        <div class="d-grid gap-2 cont-grid-123">

            <div class="profile-picture d-flex justify-center align-center">
                <img src="https://images.unsplash.com/photo-1513721032312-6a18a42c8763?w=152&h=152&fit=crop&crop=faces" alt="">
            </div>

            <div class="g-all-columns d-flex-col">
                <div class="d-flex gap-2 justify-center align-center">
                    <h1 class="profile-user-name">janedoe_</h1>

                    <!-- Botón para abrir el modal -->
                    <button class="btn h-32 w-min text-truncate btn-green" id="btn-green">
                        <span class="btn-green-transition"></span>
                        <span class="btn-green-gradient"></span>
                        <span class="btn-green-label">Edit Profile</span>
                    </button>


                    <button class="btn profile-settings-btn" aria-label="profile settings">
                        <i class="fas fa-cog" aria-hidden="true"></i>
                    </button>

                </div>

                <div class="profile-stats mt-0">

                    <ul>
                        <li><span class="profile-stat-count">164</span> posts</li>
                        <li><span class="profile-stat-count">188</span> followers</li>
                        <li><span class="profile-stat-count">206</span> following</li>
                    </ul>

                </div>

                <div class="profile-bio">

                    <p><span class="profile-real-name">Jane Doe</span> Lorem ipsum dolor sit, amet consectetur adipisicing elit 📷✈️🏕️</p>

                </div>
            </div>
        </div>

    </header>


    <main>
        <div class="d-grid gap-2 cont-grid-123 justify-center align-center">
            <div class="post-item h-220 justify-center align-center">
                <img src="https://i.pinimg.com/1200x/4b/5c/70/4b5c7078ee3497f8ee1bc68e78bf6be8.jpg" 
                class="img-scale-down " alt="...">
            </div>

            <div class="post-item h-220">
                <img src="https://i.pinimg.com/736x/d3/ad/b4/d3adb416409a2581f9e884af09054e04.jpg" 
                class="img-scale-down" alt="...">
            </div>

            <div class="post-item h-220">
                <img src="https://i.pinimg.com/736x/a3/fd/b3/a3fdb33f0c69efed845e3ff0bd0296af.jpg" 
                class="img-scale-down" alt="...">
            </div>
        </div>
    </main>

    <footer></footer>
</body>
</html>
