<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous">

    <style>
    </style>
</head>
<body>
    

    <main class="offset-1 col-10 mt-5">
        <form action="http://localhost:3000/api/v1/users/" id="user-form">
            <div class="mb-3 row">
                <label class="col-6">
                    <span>First Name:</span>
                    <input type="text" class="form-control" name="firstName">
                </label>

                <label class="col-6">
                    <span>Last Name:</span>
                    <input type="text" class="form-control" name="lastName">
                </label>
            </div>

            <div class="mb-3 row">
                <label class="col-6">
                    <span>Email:</span>
                    <input type="email" class="form-control" placeholder="name@example.com" name="email">
                </label>
            </div>

            <button type="submit" class="btn btn-primary">
                Enviar
            </button>
        </form>
    </main>


    <div id="unico">

    </div>

    <script>

        async function createUser(user, form) {

            // convertir el objeto a json
            const userJson = JSON.stringify(user);

            const response = await fetch(form.action, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: userJson
            });

            const data = await response.json();
            console.log(data);
        }


        const handleSubmit = (form) => {
            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const formData = new FormData(form);

                const objeto = Object.fromEntries(formData.entries());

                console.log(objeto);

                await createUser(objeto, form);
            });
        }

        const form = document.getElementById("user-form");
        handleSubmit(form);
        



        async function main() {
 
            const response = await fetch("http://localhost:3000/api/v1/users/");    // viene list de json
            const data = await response.json();    // convertimos lista json, a lista de objetos
            const container = document.getElementById("unico");

            const html = data.map(u => {
                return `<p>${u.firstName} - ${u.lastName}</p>`
            }).join('');

            container.innerHTML = html;
        }

        // main();




    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
        crossorigin="anonymous">
    </script>

</body>
</html>
